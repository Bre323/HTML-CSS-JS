<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Contact Form</title>
    <style>
        .form-container {
            background-color: #afddef;
            padding: 15px;
            width: 90%;
            margin: 0 auto;
            border-radius: 10px;
        }

        label {
            margin: 5px;
            color: #121212;
        }

        input,
        textarea {
            display: block;
            width: 150px;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            background-color: #4545dd;
            color: white;
            font-size: 1.1rem;
        }

        button:hover {
            transform: scale(1.1);
            background-color: #2525bd;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <form>
            <h2>Some text to show</h2>
            <label for="name">Name: </label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email: </label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message: </label>
            <textarea id="message" name="messsage" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>

</html>
